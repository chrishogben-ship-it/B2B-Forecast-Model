<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>HX B2B Partner Opportunities Forecast Model</title>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet" />
  <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
  <script src="https://unpkg.com/prop-types/prop-types.min.js" crossorigin></script>
  <!-- Recharts must load before Babel: Babel's module/exports globals trick the Recharts UMD into CommonJS mode -->
  <script src="https://cdn.jsdelivr.net/npm/recharts@2.13.3/umd/Recharts.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>* { box-sizing: border-box; margin: 0; padding: 0; }</style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
const { useState, useMemo, useCallback } = React;
const { BarChart, Bar, XAxis, YAxis, Tooltip, ResponsiveContainer, Cell, Legend } = Recharts;

const T = {
  purple: "#542E91", purpleDark: "#47277B", purpleTint: "#eeeaf4",
  yellow: "#FDDC06", yellowDark: "#d7b505", yellowTint: "#fffbe6",
  black: "#232323", white: "#ffffff", offWhite: "#F0F0F0",
  grey1: "#c2c2c5", grey2: "#d7d7d9", grey3: "#ededee", grey4: "#f7f7f7",
  greyText: "#737373",
  green: "#00B0A6", greenBg: "#e5f1f0",
  red: "#FF5F68", redBg: "#fae5e6",
  blue: "#3AA6FF", blueBg: "#e5f0f9",
  orange: "#FFB55F", orangeBg: "#f3dbcc",
  violet: "#925FFF",
};

const INITIAL_COUNTRIES = [
  { id: "GB", name: "United Kingdom", region: "British Isles", annualPax: 290000000, language: "en", currency: "GBP", hxLang: true, hxCurrency: true },
  { id: "IE", name: "Ireland", region: "British Isles", annualPax: 38000000, language: "en", currency: "EUR", hxLang: true, hxCurrency: true },
  { id: "DE", name: "Germany", region: "DACH", annualPax: 220000000, language: "de", currency: "EUR", hxLang: true, hxCurrency: true },
  { id: "FR", name: "France", region: "Western Europe", annualPax: 180000000, language: "fr", currency: "EUR", hxLang: false, hxCurrency: true },
  { id: "NL", name: "Netherlands", region: "Benelux", annualPax: 75000000, language: "nl", currency: "EUR", hxLang: false, hxCurrency: true },
  { id: "BE", name: "Belgium", region: "Benelux", annualPax: 55000000, language: "fr/nl", currency: "EUR", hxLang: false, hxCurrency: true },
  { id: "ES", name: "Spain", region: "Iberia", annualPax: 160000000, language: "es", currency: "EUR", hxLang: false, hxCurrency: true },
  { id: "IT", name: "Italy", region: "Southern Europe", annualPax: 95000000, language: "it", currency: "EUR", hxLang: false, hxCurrency: true },
  { id: "PL", name: "Poland", region: "Eastern Europe", annualPax: 40000000, language: "pl", currency: "PLN", hxLang: false, hxCurrency: false },
  { id: "SE", name: "Sweden", region: "Nordics", annualPax: 35000000, language: "sv", currency: "SEK", hxLang: false, hxCurrency: false },
  { id: "CH", name: "Switzerland", region: "DACH", annualPax: 28000000, language: "de/fr", currency: "CHF", hxLang: true, hxCurrency: false },
  { id: "AT", name: "Austria", region: "DACH", annualPax: 22000000, language: "de", currency: "EUR", hxLang: true, hxCurrency: true },
];

const PRODUCTS = ["Parking", "Hotels", "Lounges", "Fast Track", "Transfers", "Car Hire"];
const CHANNEL = { API: "API", WHITE_LABEL: "White Label", BOTH: "Both" };

const INITIAL_AVAILABILITY = {
  GB: { Parking: "live",    Hotels: "live",          Lounges: "live",          "Fast Track": "live",          Transfers: "live",    "Car Hire": "live"    },
  IE: { Parking: "live",    Hotels: "live",          Lounges: "planned",       "Fast Track": "not available", Transfers: "planned", "Car Hire": "live"    },
  DE: { Parking: "live",    Hotels: "planned",       Lounges: "planned",       "Fast Track": "not available", Transfers: "live",    "Car Hire": "live"    },
  FR: { Parking: "live",    Hotels: "live",          Lounges: "not available", "Fast Track": "not available", Transfers: "planned", "Car Hire": "live"    },
  NL: { Parking: "live",    Hotels: "planned",       Lounges: "not available", "Fast Track": "not available", Transfers: "not available", "Car Hire": "live" },
  BE: { Parking: "planned", Hotels: "not available", Lounges: "not available", "Fast Track": "not available", Transfers: "not available", "Car Hire": "live" },
  ES: { Parking: "live",    Hotels: "live",          Lounges: "live",          "Fast Track": "live",          Transfers: "live",    "Car Hire": "live"    },
  IT: { Parking: "planned", Hotels: "not available", Lounges: "not available", "Fast Track": "not available", Transfers: "not available", "Car Hire": "live" },
  PL: { Parking: "planned", Hotels: "not available", Lounges: "not available", "Fast Track": "not available", Transfers: "not available", "Car Hire": "live" },
  SE: { Parking: "unknown", Hotels: "unknown",       Lounges: "unknown",       "Fast Track": "unknown",       Transfers: "unknown", "Car Hire": "live"    },
  CH: { Parking: "live",    Hotels: "live",          Lounges: "planned",       "Fast Track": "not available", Transfers: "planned", "Car Hire": "live"    },
  AT: { Parking: "live",    Hotels: "live",          Lounges: "planned",       "Fast Track": "not available", Transfers: "not available", "Car Hire": "live" },
};

const INITIAL_PARTNERS = [];

// Maps country IDs to BigQuery market groups (matches the SQL CASE output)
const COUNTRY_TO_MARKET = {
  GB: "UK",    IE: "IRELAND",
  DE: "DACH",  AT: "DACH",   CH: "DACH",
  FR: "FRANCE", NL: "BENE",  BE: "BENE",
  ES: "SPAIN", IT: "ITALY",  PL: "POLAND/CZECH", SE: "NORDICS",
};
const MARKETS = ["UK", "IRELAND", "DACH", "FRANCE", "BENE", "SPAIN", "ITALY", "NORDICS", "POLAND/CZECH"];

// Prices (abv_gbp) and GM% from BigQuery. Transfers & Car Hire are destination products — single global rate applies.
// Hotels (AIR in BigQuery): IRELAND/SPAIN/ITALY/NORDICS/POLAND/CZECH have no market data — average of known markets used.
const PRICE_DEFAULTS = {
  Parking:      { UK: 93.78, IRELAND: 74.21, DACH: 86.12, FRANCE: 55.05, BENE: 67.76, SPAIN: 36.61, ITALY: 62.74, NORDICS: 84.32, "POLAND/CZECH": 69.20, default: 69.98 },
  Hotels:       { UK: 126.15, IRELAND: 142.34, DACH: 112.76, FRANCE: 179.11, BENE: 151.33, SPAIN: 142.34, ITALY: 142.34, NORDICS: 142.34, "POLAND/CZECH": 142.34, default: 142.34 },
  Lounges:      { UK: 100.52, IRELAND: 69.36, DACH: 77.63, FRANCE: 56.70, BENE: 63.86, SPAIN: 80.92, ITALY: 70.30, NORDICS: 57.57, "POLAND/CZECH": 66.23, default: 71.45 },
  "Fast Track": { default: 15.63 },
  // Destination products — same price regardless of departure market
  Transfers:    { default: 87.85 },
  "Car Hire":   { default: 226.84 },
};
const GM_DEFAULTS = {
  Parking:      { UK: 0.2476, IRELAND: 0.4322, DACH: 0.4126, FRANCE: 0.4068, BENE: 0.4209, SPAIN: 0.3477, ITALY: 0.4109, NORDICS: 0.4043, "POLAND/CZECH": 0.4038, default: 0.3874 },
  Hotels:       { UK: 0.1976, IRELAND: 0.3247, DACH: 0.4300, FRANCE: 0.2967, BENE: 0.3746, SPAIN: 0.3247, ITALY: 0.3247, NORDICS: 0.3247, "POLAND/CZECH": 0.3247, default: 0.3247 },
  Lounges:      { UK: 0.2429, IRELAND: 0.2994, DACH: 0.3553, FRANCE: 0.3434, BENE: 0.3350, SPAIN: 0.3589, ITALY: 0.4242, NORDICS: 0.3762, "POLAND/CZECH": 0.3774, default: 0.3459 },
  "Fast Track": { default: 0.1830 },
  // Destination products — same GM% regardless of departure market
  Transfers:    { default: 0.2311 },
  "Car Hire":   { default: 0.0875 },
};

// API attach rate: % of partner pax who add each product via API
const API_AR_DEFAULTS = { Parking: 0.042, Hotels: 0.025, Lounges: 0.012, "Fast Track": 0.008, Transfers: 0.018, "Car Hire": 0.010 };
// White label conversion rate: % of WL visitors who complete a purchase per product
const WL_CR_DEFAULTS  = { Parking: 0.028, Hotels: 0.018, Lounges: 0.008, "Fast Track": 0.005, Transfers: 0.012, "Car Hire": 0.007 };
const SCENARIO_MULT = { conservative: 0.6, base: 1.0, stretch: 1.4 };
const EMPTY_PARTNER = { id: "", name: "", channel: CHANNEL.API, countries: [], products: [], pax: 0, committed: false, notes: "", annualCosts: 0, crCost: { enabled: false, pencePerBooking: 17 }, commission: { type: "margin_share", value: 0 }, discount: { value: 0 } };

const isActive = (status) => status === "live" || status === "planned";
const toggleInArray = (arr, val) => arr.includes(val) ? arr.filter(x => x !== val) : [...arr, val];

const fmt = (n, d = 0) => isNaN(n) ? "—" : Number(n).toLocaleString("en-GB", { maximumFractionDigits: d, minimumFractionDigits: d });
const fmtMoney = (n, prefix = "") => n >= 1000000 ? `${prefix}${fmt(n / 1000000, 1)}M` : n >= 1000 ? `${prefix}${fmt(n / 1000, 0)}K` : `${prefix}${fmt(n, 0)}`;
const fmtGP  = (n) => fmtMoney(n, "£");
const fmtNum = (n) => fmtMoney(n);

const STATUS_CFG = {
  live: { label: "Live", bg: "#e5f1f0", color: "#00B0A6" },
  planned: { label: "Planned", bg: "#e5f0f9", color: "#3AA6FF" },
  "not available": { label: "Not Available", bg: "#fae5e6", color: "#FF5F68" },
  unknown: { label: "Unknown", bg: "#f3dbcc", color: "#FFB55F" },
};

const ASSUMPTION_LABEL_STYLE = { display: "block", fontSize: 11, fontWeight: 700, color: T.greyText, textTransform: "uppercase", letterSpacing: 0.5, marginBottom: 6 };

const CHANNEL_BADGE_CFG = {
  [CHANNEL.API]:         { bg: "#e5f0f9", color: "#3AA6FF" },
  [CHANNEL.WHITE_LABEL]: { bg: "#eeeaf4", color: "#542E91" },
  [CHANNEL.BOTH]:        { bg: "#e5f1f0", color: "#00B0A6" },
};

function ChannelBadge({ channel }) {
  const c = CHANNEL_BADGE_CFG[channel] ?? CHANNEL_BADGE_CFG[CHANNEL.API];
  return <span style={{ fontSize: 10, fontWeight: 700, background: c.bg, color: c.color, borderRadius: 4, padding: "2px 6px" }}>{channel}</span>;
}

function SectionHeader({ title, sub }) {
  return (
    <div style={{ marginBottom: 20 }}>
      <h2 style={{ margin: 0, fontSize: 22, fontWeight: 800, color: T.black }}>{title}</h2>
      {sub && <p style={{ margin: "4px 0 0", fontSize: 13, color: T.greyText }}>{sub}</p>}
    </div>
  );
}

function StatCard({ label, value, sub, accent, icon }) {
  return (
    <div style={{ background: T.white, borderRadius: 12, padding: 20, border: `1px solid ${T.grey2}`, borderTop: `3px solid ${accent || T.purple}` }}>
      <div style={{ fontSize: 11, fontWeight: 700, color: T.greyText, textTransform: "uppercase", letterSpacing: 0.5, marginBottom: 8 }}>{icon} {label}</div>
      <div style={{ fontSize: 28, fontWeight: 800, color: T.black, lineHeight: 1.1 }}>{value}</div>
      {sub && <div style={{ fontSize: 12, color: T.greyText, marginTop: 4 }}>{sub}</div>}
    </div>
  );
}

function ChartCard({ title, children }) {
  return (
    <div style={{ background: T.white, borderRadius: 12, padding: 20, border: `1px solid ${T.grey2}` }}>
      <div style={{ fontWeight: 700, fontSize: 14, marginBottom: 16 }}>{title}</div>
      {children}
    </div>
  );
}

function ScenarioPill({ scenario, setScenario }) {
  const colors = { conservative: T.orange, base: T.blue, stretch: T.green };
  return (
    <div style={{ display: "flex", background: "rgba(255,255,255,0.1)", borderRadius: 8, overflow: "hidden" }}>
      {["conservative", "base", "stretch"].map(s => (
        <button key={s} onClick={() => setScenario(s)} style={{
          background: scenario === s ? colors[s] : "transparent",
          color: scenario === s ? T.white : "rgba(255,255,255,0.6)",
          border: "none", padding: "7px 12px", cursor: "pointer", fontFamily: "inherit",
          fontWeight: 700, fontSize: 11, textTransform: "capitalize",
        }}>{s}</button>
      ))}
    </div>
  );
}

function Dashboard({ forecast, scenario }) {
  const { byProduct, byPartner, totalGP, totalBookings, apiOpp, wlOpp } = forecast;
  const scColors = { conservative: T.orange, base: T.blue, stretch: T.green };

  const { countryChart, gapSummary } = useMemo(() => {
    const countryChart = [...forecast.byCountry]
      .sort((a, b) => b.totalGP - a.totalGP).slice(0, 8)
      .map(c => ({ name: c.name, GP: Math.round(c.totalGP / 1000) }));
    const gapSummary = forecast.byCountry
      .flatMap(c => c.gaps)
      .reduce((acc, g) => { acc[g] = (acc[g] || 0) + 1; return acc; }, {});
    return { countryChart, gapSummary };
  }, [forecast.byCountry]);

  const productChart = useMemo(
    () => byProduct.map(p => ({ name: p.product, GP: Math.round(p.gp / 1000) })),
    [byProduct]
  );

  return (
    <div>
      <div style={{ background: `${scColors[scenario]}18`, border: `1px solid ${scColors[scenario]}40`, borderRadius: 10, padding: "10px 16px", marginBottom: 20 }}>
        <span style={{ fontWeight: 700, color: scColors[scenario], textTransform: "capitalize", fontSize: 13 }}>● {scenario} scenario — </span>
        <span style={{ fontSize: 13, color: T.greyText }}>{SCENARIO_MULT[scenario] * 100}% of base attach rates applied</span>
      </div>
      <div style={{ display: "grid", gridTemplateColumns: "repeat(4, 1fr)", gap: 16, marginBottom: 24 }}>
        <StatCard label="Total Forecast GP" value={fmtGP(totalGP)} sub="Annual, all products" accent={T.purple} icon="💰" />
        <StatCard label="Forecast Bookings" value={fmtNum(totalBookings)} sub="Annual, all countries" accent={T.green} icon="✈️" />
        <StatCard label="API Opportunity" value={fmtGP(apiOpp)} sub="Via API partners" accent={T.blue} icon="🔌" />
        <StatCard label="White Label Opp." value={fmtGP(wlOpp)} sub="Via white label partners" accent={T.orange} icon="🏷️" />
      </div>
      <div style={{ display: "grid", gridTemplateColumns: "2fr 1fr", gap: 16, marginBottom: 16 }}>
        <ChartCard title="Forecast GP by Country (£K)">
          <ResponsiveContainer width="100%" height={220}>
            <BarChart data={countryChart}>
              <XAxis dataKey="name" tick={{ fontSize: 11 }} />
              <YAxis tick={{ fontSize: 11 }} />
              <Tooltip formatter={v => [`£${v}K`, "GP"]} contentStyle={{ borderRadius: 8, fontFamily: "inherit" }} />
              <Bar dataKey="GP" fill={T.purple} radius={[4, 4, 0, 0]} />
            </BarChart>
          </ResponsiveContainer>
        </ChartCard>
        <ChartCard title="GP by Product (£K)">
          <ResponsiveContainer width="100%" height={220}>
            <BarChart data={productChart} layout="vertical">
              <XAxis type="number" tick={{ fontSize: 11 }} />
              <YAxis dataKey="name" type="category" tick={{ fontSize: 11 }} width={70} />
              <Tooltip formatter={v => [`£${v}K`, "GP"]} contentStyle={{ borderRadius: 8 }} />
              <Bar dataKey="GP" fill={T.yellow} radius={[0, 4, 4, 0]} />
            </BarChart>
          </ResponsiveContainer>
        </ChartCard>
      </div>
      {forecast.byPartner.length > 0 && (
        <div style={{ marginBottom: 16 }}>
          <ChartCard title="GP by Partner × Product">
            <div style={{ overflowX: "auto" }}>
              <table style={{ borderCollapse: "collapse", width: "100%", fontSize: 12 }}>
                <thead>
                  <tr style={{ background: T.purpleTint }}>
                    <th style={{ padding: "8px 12px", textAlign: "left", fontWeight: 700, color: T.purple, whiteSpace: "nowrap" }}>Partner</th>
                    {PRODUCTS.map(prod => (
                      <th key={prod} style={{ padding: "8px 12px", textAlign: "right", fontWeight: 700, color: T.purple, whiteSpace: "nowrap" }}>{prod}</th>
                    ))}
                    <th style={{ padding: "8px 12px", textAlign: "right", fontWeight: 800, color: T.purple, whiteSpace: "nowrap" }}>Net GP</th>
                  </tr>
                </thead>
                <tbody>
                  {[...forecast.byPartner].sort((a, b) => b.totalGP - a.totalGP).map((p, i) => (
                    <tr key={p.id} style={{ background: i % 2 === 0 ? T.white : T.grey4, borderBottom: `1px solid ${T.grey3}` }}>
                      <td style={{ padding: "8px 12px", fontWeight: 700, whiteSpace: "nowrap" }}>
                        {p.name}
                        <div style={{ marginTop: 2 }}><ChannelBadge channel={p.channel} /></div>
                      </td>
                      {PRODUCTS.map(prod => (
                        <td key={prod} style={{ padding: "8px 12px", textAlign: "right", color: (p.gpByProduct[prod] || 0) > 0 ? T.black : T.grey1 }}>
                          {(p.gpByProduct[prod] || 0) > 0 ? fmtGP(p.gpByProduct[prod]) : "—"}
                        </td>
                      ))}
                      <td style={{ padding: "8px 12px", textAlign: "right", fontWeight: 800, color: T.purple }}>{fmtGP(p.totalGP)}</td>
                    </tr>
                  ))}
                </tbody>
              </table>
            </div>
          </ChartCard>
        </div>
      )}
      <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 16 }}>
        <ChartCard title="Top Partners by Forecast GP">
          {[...byPartner].sort((a, b) => b.totalGP - a.totalGP).slice(0, 5).map((p, i) => (
            <div key={p.id} style={{ display: "flex", alignItems: "center", gap: 12, padding: "10px 0", borderBottom: i < 4 ? `1px solid ${T.grey3}` : "none" }}>
              <span style={{ fontSize: 16 }}>{["🥇","🥈","🥉","4️⃣","5️⃣"][i]}</span>
              <div style={{ flex: 1 }}>
                <div style={{ fontWeight: 700, fontSize: 13 }}>{p.name}</div>
                <div style={{ fontSize: 11, color: T.greyText }}>{p.channel} · {p.countries.length} countries</div>
              </div>
              <div style={{ textAlign: "right" }}>
                <div style={{ fontWeight: 700, color: T.purple }}>{fmtGP(p.totalGP)}</div>
                <ChannelBadge channel={p.channel} />
              </div>
            </div>
          ))}
        </ChartCard>
        <ChartCard title="Capability Gaps">
          <div style={{ fontSize: 12, color: T.greyText, marginBottom: 12 }}>Issues reducing forecast potential</div>
          {Object.entries(gapSummary).sort((a, b) => b[1] - a[1]).slice(0, 7).map(([gap, count]) => (
            <div key={gap} style={{ display: "flex", alignItems: "center", gap: 8, marginBottom: 8 }}>
              <div style={{ flex: 1 }}>
                <div style={{ fontSize: 12, fontWeight: 600 }}>{gap}</div>
                <div style={{ height: 4, background: T.grey3, borderRadius: 2, marginTop: 3 }}>
                  <div style={{ height: 4, width: `${(count / INITIAL_COUNTRIES.length) * 100}%`, background: T.red, borderRadius: 2 }} />
                </div>
              </div>
              <span style={{ fontSize: 12, fontWeight: 700, color: T.red, minWidth: 20 }}>{count}</span>
            </div>
          ))}
        </ChartCard>
      </div>
    </div>
  );
}

function CountriesView({ forecast, setCountries }) {
  const [editId, setEditId] = useState(null);
  const [editVal, setEditVal] = useState({});
  return (
    <div>
      <SectionHeader title="Country Forecast" sub="Click Edit to update annual passenger numbers — forecast recalculates instantly" />
      <div style={{ background: T.white, borderRadius: 12, border: `1px solid ${T.grey2}`, overflow: "auto" }}>
        <table style={{ width: "100%", borderCollapse: "collapse" }}>
          <thead>
            <tr style={{ background: T.purple, color: T.white }}>
              {["Country","Region","Annual Pax","Est. Bookings","Forecast Bookings","Forecast GP","Language","Currency","Gaps",""].map(h => (
                <th key={h} style={{ padding: "12px 16px", textAlign: "left", fontSize: 11, fontWeight: 700, letterSpacing: 0.5, textTransform: "uppercase", whiteSpace: "nowrap" }}>{h}</th>
              ))}
            </tr>
          </thead>
          <tbody>
            {forecast.byCountry.map((c, i) => (
              <tr key={c.id} style={{ background: i % 2 === 0 ? T.white : T.grey4, borderBottom: `1px solid ${T.grey3}` }}>
                <td style={{ padding: "12px 16px", fontWeight: 700 }}>{c.name}</td>
                <td style={{ padding: "12px 16px", fontSize: 13, color: T.greyText }}>{c.region}</td>
                <td style={{ padding: "12px 16px" }}>
                  {editId === c.id
                    ? <input type="number" value={editVal.annualPax} onChange={e => setEditVal({ annualPax: e.target.value })}
                        style={{ width: 120, border: `2px solid ${T.purple}`, borderRadius: 6, padding: "4px 8px", fontFamily: "inherit", fontSize: 13 }} />
                    : <span style={{ fontWeight: 600 }}>{fmtNum(c.annualPax)}</span>}
                </td>
                <td style={{ padding: "12px 16px", fontSize: 13, color: T.greyText }}>{fmtNum(c.estBookings)}</td>
                <td style={{ padding: "12px 16px", fontWeight: 700, color: T.purple }}>{fmtNum(c.totalBookings)}</td>
                <td style={{ padding: "12px 16px", fontWeight: 800, color: T.green }}>{fmtGP(c.totalGP)}</td>
                <td style={{ padding: "12px 16px" }}>
                  <span style={{ display: "flex", alignItems: "center", gap: 4, fontSize: 12 }}>
                    <span style={{ width: 8, height: 8, borderRadius: "50%", background: c.hxLang ? T.green : T.red, display: "inline-block" }} />
                    <span style={{ color: c.hxLang ? T.black : T.red, fontWeight: c.hxLang ? 400 : 600 }}>{c.language.toUpperCase()}</span>
                  </span>
                </td>
                <td style={{ padding: "12px 16px" }}>
                  <span style={{ display: "flex", alignItems: "center", gap: 4, fontSize: 12 }}>
                    <span style={{ width: 8, height: 8, borderRadius: "50%", background: c.hxCurrency ? T.green : T.red, display: "inline-block" }} />
                    <span style={{ color: c.hxCurrency ? T.black : T.red, fontWeight: c.hxCurrency ? 400 : 600 }}>{c.currency}</span>
                  </span>
                </td>
                <td style={{ padding: "12px 16px" }}>
                  {c.gaps.length > 0
                    ? <span title={c.gaps.join(", ")} style={{ fontSize: 11, background: T.redBg, color: T.red, borderRadius: 4, padding: "2px 8px", fontWeight: 700, cursor: "help" }}>{c.gaps.length} gap{c.gaps.length > 1 ? "s" : ""}</span>
                    : <span style={{ fontSize: 11, background: T.greenBg, color: T.green, borderRadius: 4, padding: "2px 8px", fontWeight: 700 }}>✓ Clean</span>}
                </td>
                <td style={{ padding: "12px 16px" }}>
                  {editId === c.id
                    ? <button onClick={() => { setCountries(cs => cs.map(x => x.id === c.id ? { ...x, annualPax: Number(editVal.annualPax) } : x)); setEditId(null); }}
                        style={{ background: T.green, color: T.white, border: "none", borderRadius: 6, padding: "5px 12px", fontFamily: "inherit", fontWeight: 700, fontSize: 12, cursor: "pointer" }}>Save</button>
                    : <button onClick={() => { setEditId(c.id); setEditVal({ annualPax: c.annualPax }); }}
                        style={{ background: T.purple, color: T.white, border: "none", borderRadius: 6, padding: "5px 12px", fontFamily: "inherit", fontWeight: 700, fontSize: 12, cursor: "pointer" }}>Edit</button>}
                </td>
              </tr>
            ))}
          </tbody>
        </table>
      </div>
    </div>
  );
}

  const sortedPartners = useMemo(

                      ? <span style={{ fontSize: 10, fontWeight: 700, background: T.greenBg, color: T.green, borderRadius: 4, padding: "2px 6px" }}>✓ Committed</span>
                      : <span style={{ fontSize: 10, fontWeight: 700, background: T.orangeBg, color: T.orange, borderRadius: 4, padding: "2px 6px" }}>~ Prospect</span>}

                </div>
                <div style={{ textAlign: "center", minWidth: 110 }}>

function AvailabilityMatrix({ countries, availability, setAvailability }) {
  const cycle = (cid, p) => {
    const order = ["live", "planned", "not available", "unknown"];
    const cur = availability[cid]?.[p] ?? "unknown";
    const next = order[(order.indexOf(cur) + 1) % order.length];
    setAvailability(prev => ({ ...prev, [cid]: { ...(prev[cid] || {}), [p]: next } }));
  };
  return (
    <div>
      <SectionHeader title="Product Availability Matrix" sub="Click any cell to cycle: Live → Planned → Not Available → Unknown" />
      <div style={{ background: T.white, borderRadius: 12, border: `1px solid ${T.grey2}`, overflow: "auto" }}>
        <table style={{ borderCollapse: "collapse", width: "100%" }}>
          <thead>
            <tr>
              <th style={{ padding: "12px 16px", background: T.purple, color: T.white, textAlign: "left", fontSize: 12, fontWeight: 700, position: "sticky", left: 0, zIndex: 1 }}>Country</th>
              {PRODUCTS.map(p => <th key={p} style={{ padding: "12px 16px", background: T.purple, color: T.white, fontSize: 11, fontWeight: 700, textAlign: "center", whiteSpace: "nowrap" }}>{p}</th>)}
            </tr>
          </thead>
          <tbody>
            {countries.map((c, i) => (
              <tr key={c.id} style={{ background: i % 2 === 0 ? T.white : T.grey4 }}>
                <td style={{ padding: "10px 16px", fontWeight: 700, fontSize: 13, borderRight: `1px solid ${T.grey2}`, position: "sticky", left: 0, background: i % 2 === 0 ? T.white : T.grey4 }}>{c.name}</td>
                {PRODUCTS.map(p => {
                  const status = availability[c.id]?.[p] ?? "unknown";
                  const cfg = STATUS_CFG[status];
                  return (
                    <td key={p} style={{ padding: "8px 12px", textAlign: "center", cursor: "pointer" }} onClick={() => cycle(c.id, p)}>
                      <span style={{ background: cfg.bg, color: cfg.color, borderRadius: 6, padding: "4px 10px", fontSize: 11, fontWeight: 700, display: "inline-block", minWidth: 90 }}>
                        <span style={{ display: "inline-block", width: 6, height: 6, borderRadius: "50%", background: cfg.color, marginRight: 4, verticalAlign: "middle" }} />
                        {cfg.label}
                      </span>
                    </td>
                  );
                })}
              </tr>
            ))}
          </tbody>
        </table>
      </div>
      <div style={{ display: "flex", gap: 12, marginTop: 12, flexWrap: "wrap" }}>
        {Object.entries(STATUS_CFG).map(([k, cfg]) => (
          <div key={k} style={{ display: "flex", alignItems: "center", gap: 6, background: T.white, borderRadius: 8, padding: "5px 12px", border: `1px solid ${T.grey2}`, fontSize: 12, fontWeight: 600 }}>
            <span style={{ width: 8, height: 8, borderRadius: "50%", background: cfg.color, display: "inline-block" }} /> {cfg.label}
          </div>
        ))}
        <div style={{ fontSize: 12, color: T.greyText, alignSelf: "center" }}>← Click any cell to change</div>
      </div>
    </div>
  );
}

function OverrideSlider({ label, globalValue, override, onSet, onReset, min, max, step, formatVal, accentColor }) {
  const hasOverride = override !== undefined;
  const value = hasOverride ? override : globalValue;
  return (
    <div>
      <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", marginBottom: 2 }}>
        <label style={{ ...ASSUMPTION_LABEL_STYLE, marginBottom: 0 }}>{label}</label>
        {hasOverride
          ? <button onClick={onReset} style={{ fontSize: 10, color: T.red, background: "none", border: "none", cursor: "pointer", padding: 0, fontFamily: "inherit", fontWeight: 700 }}>↺ reset</button>
          : <span style={{ fontSize: 10, color: T.grey1, fontWeight: 600 }}>global</span>}
      </div>
      <div style={{ display: "flex", alignItems: "center", gap: 8, marginTop: 4 }}>
        <input type="range" min={min} max={max} step={step} value={value}
          onChange={e => onSet(Number(e.target.value))}
          style={{ flex: 1, accentColor: hasOverride ? accentColor : T.grey1 }} />
        <span style={{ fontWeight: 700, color: hasOverride ? accentColor : T.greyText, minWidth: 48, textAlign: "right" }}>{formatVal(value)}</span>
      </div>
    </div>
  );
}

function CountryAssumptionsPanel({ countries, priceDefaults, gmDefaults, priceOverrides, setPriceOverrides, gmOverrides, setGmOverrides, apiAttachRates, apiRateOverrides, setApiRateOverrides, wlConversionRates, wlRateOverrides, setWlRateOverrides }) {
  const [selectedCid, setSelectedCid] = useState(countries[0]?.id ?? "");
  const country = countries.find(c => c.id === selectedCid);
  const market = COUNTRY_TO_MARKET[selectedCid];

  const setOverride = (setter, p, val) =>
    setter(prev => ({ ...prev, [selectedCid]: { ...(prev[selectedCid] || {}), [p]: val } }));

  const resetOverride = (setter, p) =>
    setter(prev => {
      const co = { ...(prev[selectedCid] || {}) };
      delete co[p];
      const next = { ...prev };
      if (Object.keys(co).length === 0) delete next[selectedCid];
      else next[selectedCid] = co;
      return next;
    });

  const overrideCount = (cid) =>
    Object.keys(priceOverrides[cid] || {}).length +
    Object.keys(gmOverrides[cid] || {}).length +
    Object.keys(apiRateOverrides[cid] || {}).length +
    Object.keys(wlRateOverrides[cid] || {}).length;

  return (
    <div>
      <div style={{ display: "flex", gap: 6, flexWrap: "wrap", marginBottom: 20 }}>
        {countries.map(c => {
          const active = c.id === selectedCid;
          const n = overrideCount(c.id);
          return (
            <button key={c.id} onClick={() => setSelectedCid(c.id)} style={{
              padding: "5px 10px", borderRadius: 6,
              border: `1px solid ${active ? T.purple : T.grey2}`,
              background: active ? T.purpleTint : T.white,
              color: active ? T.purple : T.greyText,
              fontFamily: "inherit", fontWeight: active ? 700 : 600, fontSize: 12, cursor: "pointer",
              display: "flex", alignItems: "center", gap: 5,
            }}>
              {c.name}
              {n > 0 && <span style={{ background: T.orange, color: T.white, borderRadius: 10, fontSize: 9, fontWeight: 700, padding: "1px 5px" }}>{n}</span>}
            </button>
          );
        })}
      </div>
      {country && (
        <div style={{ display: "grid", gap: 16 }}>
          <div style={{ background: T.white, borderRadius: 12, padding: 20, border: `1px solid ${T.orange}40` }}>
            <div style={{ fontWeight: 700, fontSize: 14, marginBottom: 4 }}>Price Per Booking (£) — {country.name}</div>
            <div style={{ fontSize: 12, color: T.greyText, marginBottom: 16 }}>
              Override the {market} market price for this country specifically. Orange = country-level override active.
            </div>
            <div style={{ display: "grid", gridTemplateColumns: "repeat(3, 1fr)", gap: 16 }}>
              {PRODUCTS.map(p => (
                <OverrideSlider key={p} label={p}
                  globalValue={priceDefaults[p]?.[market] ?? priceDefaults[p]?.default ?? 0}
                  override={priceOverrides[selectedCid]?.[p]}
                  onSet={val => setOverride(setPriceOverrides, p, val)}
                  onReset={() => resetOverride(setPriceOverrides, p)}
                  min={1} max={400} step={1} formatVal={v => `£${v.toFixed(0)}`} accentColor={T.orange} />
              ))}
            </div>
          </div>
          <div style={{ background: T.white, borderRadius: 12, padding: 20, border: `1px solid ${T.green}40` }}>
            <div style={{ fontWeight: 700, fontSize: 14, marginBottom: 4 }}>Gross Margin % — {country.name}</div>
            <div style={{ fontSize: 12, color: T.greyText, marginBottom: 16 }}>
              Override the {market} market GM% for this country specifically. Green = country-level override active.
            </div>
            <div style={{ display: "grid", gridTemplateColumns: "repeat(3, 1fr)", gap: 16 }}>
              {PRODUCTS.map(p => (
                <OverrideSlider key={p} label={p}
                  globalValue={gmDefaults[p]?.[market] ?? gmDefaults[p]?.default ?? 0}
                  override={gmOverrides[selectedCid]?.[p]}
                  onSet={val => setOverride(setGmOverrides, p, val)}
                  onReset={() => resetOverride(setGmOverrides, p)}
                  min={0.01} max={0.5} step={0.005} formatVal={v => `${(v * 100).toFixed(1)}%`} accentColor={T.green} />
              ))}

function ScenarioComparison({ countries, availability, priceDefaults, gmDefaults, priceOverrides, gmOverrides, apiAttachRates, wlConversionRates, paxDivisor, apiRateOverrides, wlRateOverrides }) {
  const { scenarios, countryChartData } = useMemo(() => {
    const getPrice   = (cid, p) => priceOverrides[cid]?.[p] ?? priceDefaults[p]?.[COUNTRY_TO_MARKET[cid]] ?? priceDefaults[p]?.default ?? 0;
    const getGMPct   = (cid, p) => gmOverrides[cid]?.[p]    ?? gmDefaults[p]?.[COUNTRY_TO_MARKET[cid]]    ?? gmDefaults[p]?.default    ?? 0;
    const getGP      = (cid, p) => getPrice(cid, p) * getGMPct(cid, p);
    const getApiRate = (cid, p) => apiRateOverrides[cid]?.[p] ?? apiAttachRates[p]    ?? 0;
    const getWlRate  = (cid, p) => wlRateOverrides[cid]?.[p]  ?? wlConversionRates[p] ?? 0;
    const blendedRate = (cid, p) => (getApiRate(cid, p) + getWlRate(cid, p)) / 2;
    const calc = (mult) => {
      let gp = 0, bk = 0;
      countries.forEach(c => {
        PRODUCTS.forEach(p => {
          if (isActive(availability[c.id]?.[p] ?? "unknown")) {
            const b = (c.annualPax / paxDivisor) * blendedRate(c.id, p) * mult;
            gp += b * getGP(c.id, p); bk += b;
          }
        });
      });
      return { gp, bk };
    };
    const scenarios = {
      conservative: { ...calc(0.6), color: T.orange, desc: "60% of base rates. Slow rollouts, low conversion." },
      base:         { ...calc(1.0), color: T.blue,   desc: "Standard rates. Normal market penetration assumed." },
      stretch:      { ...calc(1.4), color: T.green,  desc: "140% of base rates. All partners committed, fast rollout." },
    };
    const countryChartData = countries.map(c => {
      const gpForMult = (mult) => PRODUCTS.reduce((sum, p) =>
        isActive(availability[c.id]?.[p] ?? "unknown")
          ? sum + (c.annualPax / paxDivisor) * blendedRate(c.id, p) * mult * getGP(c.id, p)
          : sum, 0);
      return { name: c.name, Conservative: Math.round(gpForMult(0.6)/1000), Base: Math.round(gpForMult(1.0)/1000), Stretch: Math.round(gpForMult(1.4)/1000) };
    });
    return { scenarios, countryChartData };
  }, [countries, availability, priceDefaults, gmDefaults, priceOverrides, gmOverrides, apiAttachRates, wlConversionRates, paxDivisor, apiRateOverrides, wlRateOverrides]);

  const chartData = Object.entries(scenarios).map(([name, s]) => ({ name: name.charAt(0).toUpperCase() + name.slice(1), GP: Math.round(s.gp / 1000) }));

  return (
    <div>
      <SectionHeader title="Scenario Comparison" sub="Conservative, base and stretch forecasts side by side" />
      <div style={{ display: "grid", gridTemplateColumns: "repeat(3, 1fr)", gap: 16, marginBottom: 24 }}>
        {Object.entries(scenarios).map(([name, s]) => (
          <div key={name} style={{ background: T.white, borderRadius: 12, padding: 24, border: `2px solid ${s.color}`, position: "relative", overflow: "hidden" }}>
            <div style={{ position: "absolute", top: 0, left: 0, right: 0, height: 4, background: s.color }} />
            <div style={{ fontWeight: 800, fontSize: 15, textTransform: "capitalize", color: s.color, marginBottom: 4 }}>{name}</div>
            <div style={{ fontSize: 11, color: T.greyText, marginBottom: 16, lineHeight: 1.4 }}>{s.desc}</div>
            <div style={{ marginBottom: 10 }}>
              <div style={{ fontSize: 11, color: T.greyText, fontWeight: 700, textTransform: "uppercase", letterSpacing: 0.5 }}>Annual GP</div>
              <div style={{ fontSize: 32, fontWeight: 800 }}>{fmtGP(s.gp)}</div>
            </div>
            <div>
              <div style={{ fontSize: 11, color: T.greyText, fontWeight: 700, textTransform: "uppercase", letterSpacing: 0.5 }}>Annual Bookings</div>
              <div style={{ fontSize: 20, fontWeight: 700, color: T.greyText }}>{fmtNum(s.bk)}</div>
            </div>
          </div>
        ))}
      </div>
      <div style={{ background: T.white, borderRadius: 12, padding: 20, border: `1px solid ${T.grey2}`, marginBottom: 16 }}>
        <div style={{ fontWeight: 700, fontSize: 14, marginBottom: 16 }}>GP Comparison (£K)</div>
        <ResponsiveContainer width="100%" height={220}>
          <BarChart data={chartData}>
            <XAxis dataKey="name" tick={{ fontSize: 13, fontWeight: 700 }} />
            <YAxis tick={{ fontSize: 11 }} />
            <Tooltip formatter={v => [`£${v}K`, "GP"]} contentStyle={{ borderRadius: 8 }} />
            <Bar dataKey="GP" radius={[6, 6, 0, 0]}>
              {chartData.map((_, i) => <Cell key={i} fill={[T.orange, T.blue, T.green][i]} />)}
            </Bar>
          </BarChart>
        </ResponsiveContainer>
      </div>
      <div style={{ background: T.white, borderRadius: 12, padding: 20, border: `1px solid ${T.grey2}` }}>
        <div style={{ fontWeight: 700, fontSize: 14, marginBottom: 16 }}>GP by Country — All Scenarios (£K)</div>
        <ResponsiveContainer width="100%" height={260}>
          <BarChart data={countryChartData}>
            <XAxis dataKey="name" tick={{ fontSize: 11 }} />
            <YAxis tick={{ fontSize: 11 }} />
            <Tooltip contentStyle={{ borderRadius: 8 }} formatter={v => [`£${v}K`]} />
            <Legend />
            <Bar dataKey="Conservative" fill={T.orange} radius={[3, 3, 0, 0]} />
            <Bar dataKey="Base" fill={T.blue} radius={[3, 3, 0, 0]} />
            <Bar dataKey="Stretch" fill={T.green} radius={[3, 3, 0, 0]} />
          </BarChart>
        </ResponsiveContainer>
      </div>
    </div>
  );
}

function App() {
  const [activeTab, setActiveTab] = useState("dashboard");
  const [countries, setCountries] = useState(INITIAL_COUNTRIES);
  const [availability, setAvailability] = useState(INITIAL_AVAILABILITY);
  const [partners, setPartners] = useState(INITIAL_PARTNERS);
  const [priceDefaults, setPriceDefaults] = useState(PRICE_DEFAULTS);
  const [gmDefaults, setGmDefaults] = useState(GM_DEFAULTS);
  const [priceOverrides, setPriceOverrides] = useState({});
  const [gmOverrides, setGmOverrides] = useState({});
  const [apiAttachRates, setApiAttachRates] = useState(API_AR_DEFAULTS);
  const [wlConversionRates, setWlConversionRates] = useState(WL_CR_DEFAULTS);
  const [apiRateOverrides, setApiRateOverrides] = useState({});
  const [wlRateOverrides, setWlRateOverrides] = useState({});
  const [paxDivisor, setPaxDivisor] = useState(2.4);
  const [scenario, setScenario] = useState("base");

  const forecast = useMemo(() => {
    const mult = SCENARIO_MULT[scenario];
    const countryById = new Map(countries.map(c => [c.id, c]));

    const getPrice   = (cid, p) => priceOverrides[cid]?.[p] ?? priceDefaults[p]?.[COUNTRY_TO_MARKET[cid]] ?? priceDefaults[p]?.default ?? 0;
    const getGMPct   = (cid, p) => gmOverrides[cid]?.[p]    ?? gmDefaults[p]?.[COUNTRY_TO_MARKET[cid]]    ?? gmDefaults[p]?.default    ?? 0;
    const getGP      = (cid, p) => getPrice(cid, p) * getGMPct(cid, p);
    const getApiRate = (cid, p) => apiRateOverrides[cid]?.[p] ?? apiAttachRates[p]    ?? 0;
    const getWlRate  = (cid, p) => wlRateOverrides[cid]?.[p]  ?? wlConversionRates[p] ?? 0;
    const blendedRate = (cid, p) => (getApiRate(cid, p) + getWlRate(cid, p)) / 2;

    const byCountry = countries.map(c => {
      const bookings = c.annualPax / paxDivisor;
      let totalBookings = 0, totalGP = 0;
      const gaps = [];
      if (!c.hxLang) gaps.push("Language not supported");
      if (!c.hxCurrency) gaps.push("Currency not supported");
      PRODUCTS.forEach(p => {
        const status = availability[c.id]?.[p] ?? "unknown";
        if (isActive(status)) {
          const bk = bookings * blendedRate(c.id, p) * mult;
          totalBookings += bk; totalGP += bk * getGP(c.id, p);
        } else if (status === "not available") {
          gaps.push(`${p} unavailable`);
        }
      });
      return { ...c, estBookings: bookings, totalBookings, totalGP, gaps };
    });

    const byPartner = partners.map(pt => {
      const partnerCountries = pt.countries.map(cid => countryById.get(cid)).filter(Boolean);
      const totalCountryPax = partnerCountries.reduce((s, c) => s + c.annualPax, 0);

      let totalBookings = 0, grossRevenue = 0, grossGP = 0;
      const gpByProduct = Object.fromEntries(PRODUCTS.map(p => [p, 0]));

      pt.countries.forEach(cid => {
        const c = countryById.get(cid); if (!c) return;
        const paxShare = totalCountryPax > 0 ? c.annualPax / totalCountryPax : 1 / pt.countries.length;
        const paxInCountry = pt.pax * paxShare;

        pt.products.forEach(p => {
          if (!isActive(availability[cid]?.[p] ?? "unknown")) return;
          const basePrice = getPrice(cid, p);
          const effectivePrice = basePrice * (1 - (pt.discount?.value || 0) / 100);
          const gmPct = getGMPct(cid, p);

          const addBk = (bk) => {
            totalBookings += bk;
            grossRevenue  += bk * effectivePrice;
            const g = bk * effectivePrice * gmPct;
            grossGP += g;
            gpByProduct[p] += g;
          };

          if (pt.channel === CHANNEL.API || pt.channel === CHANNEL.BOTH)
            addBk(paxInCountry * getApiRate(cid, p) * mult);
          if (pt.channel === CHANNEL.WHITE_LABEL || pt.channel === CHANNEL.BOTH)
            addBk(paxInCountry * getWlRate(cid, p) * mult);
        });
      });

      let netGP = grossGP;
      if (pt.commission?.value > 0) {
        netGP = pt.commission.type === "margin_share"
          ? grossGP * (1 - pt.commission.value / 100)
          : grossGP - grossRevenue * (pt.commission.value / 100);
      }
      if (pt.crCost?.enabled) netGP -= (pt.crCost.pencePerBooking / 100) * totalBookings;
      netGP -= (pt.annualCosts || 0);

      return {
        ...pt, totalBookings, grossRevenue, grossGP, gpByProduct, totalGP: netGP,
        isAPI: pt.channel === CHANNEL.API || pt.channel === CHANNEL.BOTH,
        isWL:  pt.channel === CHANNEL.WHITE_LABEL || pt.channel === CHANNEL.BOTH,
      };
    });

    const byProduct = PRODUCTS.map(p => {
      let bk = 0, gp = 0;
      countries.forEach(c => {
        if (isActive(availability[c.id]?.[p] ?? "unknown")) {
          const b = (c.annualPax / paxDivisor) * blendedRate(c.id, p) * mult;
          bk += b; gp += b * getGP(c.id, p);
        }
      });
      return { product: p, bookings: bk, gp };
    });

    return {
      byCountry, byPartner, byProduct,
      totalGP:       byCountry.reduce((s, c) => s + c.totalGP, 0),
      totalBookings: byCountry.reduce((s, c) => s + c.totalBookings, 0),
      apiOpp: byPartner.filter(p => p.isAPI).reduce((s, p) => s + p.totalGP, 0),
      wlOpp:  byPartner.filter(p => p.isWL).reduce((s, p) => s + p.totalGP, 0),
    };
  }, [countries, availability, partners, priceDefaults, gmDefaults, apiAttachRates, wlConversionRates, priceOverrides, gmOverrides, apiRateOverrides, wlRateOverrides, paxDivisor, scenario]);

  const exportCSV = useCallback(() => {
    const rows = [["Country","Region","Annual Pax","Est Bookings","Forecast Bookings","Forecast GP","Gaps"].join(",")];
    forecast.byCountry.forEach(c => rows.push([c.name, c.region, c.annualPax, Math.round(c.estBookings), Math.round(c.totalBookings), Math.round(c.totalGP), `"${c.gaps.join("; ")}"`].join(",")));
    const url = URL.createObjectURL(new Blob([rows.join("\n")], { type: "text/csv" }));
    const a = document.createElement("a");
    a.href = url; a.download = "hx-forecast.csv"; a.click();
    URL.revokeObjectURL(url);
  }, [forecast.byCountry]);

  const tabs = [
    { id: "dashboard",   label: "Dashboard",    icon: "📊" },
    { id: "countries",   label: "Countries",    icon: "🌍" },
    { id: "partners",    label: "Partners",     icon: "🤝" },
    { id: "matrix",      label: "Availability", icon: "📋" },
    { id: "assumptions", label: "Assumptions",  icon: "⚙️" },
    { id: "scenarios",   label: "Scenarios",    icon: "🎯" },
  ];

  return (
    <div style={{ fontFamily: "'Nunito', sans-serif", background: T.offWhite, minHeight: "100vh", color: T.black }}>
      <nav style={{ background: T.purple, color: T.white, padding: "0 24px", display: "flex", alignItems: "center", gap: 0, boxShadow: "0 2px 12px rgba(84,46,145,0.3)" }}>
        <div style={{ display: "flex", alignItems: "center", gap: 10, padding: "16px 24px 16px 0", borderRight: `1px solid rgba(255,255,255,0.15)`, marginRight: 24 }}>
          <div style={{ background: T.yellow, borderRadius: 8, padding: "4px 10px", fontWeight: 800, color: T.black, fontSize: 15 }}>HX</div>
          <div>
            <div style={{ fontWeight: 700, fontSize: 14, lineHeight: 1.2 }}>B2B Partner Opportunities</div>
            <div style={{ fontSize: 11, opacity: 0.7, fontWeight: 600, lineHeight: 1.2 }}>Forecast Model</div>
          </div>
        </div>
        <div style={{ display: "flex", gap: 0, flex: 1 }}>
          {tabs.map(t => (
            <button key={t.id} onClick={() => setActiveTab(t.id)} style={{
              background: activeTab === t.id ? "rgba(253,220,6,0.15)" : "transparent",
              color: activeTab === t.id ? T.yellow : "rgba(255,255,255,0.75)",
              border: "none", borderBottom: activeTab === t.id ? `2px solid ${T.yellow}` : "2px solid transparent",
              padding: "18px 16px", cursor: "pointer", fontFamily: "inherit", fontWeight: 600, fontSize: 13,
              display: "flex", alignItems: "center", gap: 6,
            }}>{t.icon} {t.label}</button>
          ))}
        </div>
        <div style={{ display: "flex", gap: 8, alignItems: "center" }}>
          <ScenarioPill scenario={scenario} setScenario={setScenario} />
          <button onClick={exportCSV} style={{ background: T.yellow, color: T.black, border: "none", borderRadius: 8, padding: "8px 16px", fontFamily: "inherit", fontWeight: 700, fontSize: 12, cursor: "pointer" }}>↓ CSV</button>
        </div>
      </nav>
      <main style={{ padding: 24, maxWidth: 1400, margin: "0 auto" }}>
        {activeTab === "dashboard"   && <Dashboard forecast={forecast} scenario={scenario} />}
        {activeTab === "countries"   && <CountriesView forecast={forecast} setCountries={setCountries} />}
        {activeTab === "partners"    && <PartnersView forecast={forecast} setPartners={setPartners} />}
        {activeTab === "matrix"      && <AvailabilityMatrix countries={countries} availability={availability} setAvailability={setAvailability} />}
        {activeTab === "assumptions" && <AssumptionsPanel
            priceDefaults={priceDefaults} setPriceDefaults={setPriceDefaults}
            gmDefaults={gmDefaults} setGmDefaults={setGmDefaults}
            priceOverrides={priceOverrides} setPriceOverrides={setPriceOverrides}
            gmOverrides={gmOverrides} setGmOverrides={setGmOverrides}
            apiAttachRates={apiAttachRates} setApiAttachRates={setApiAttachRates}
            wlConversionRates={wlConversionRates} setWlConversionRates={setWlConversionRates}
            paxDivisor={paxDivisor} setPaxDivisor={setPaxDivisor}
            countries={countries}
            apiRateOverrides={apiRateOverrides} setApiRateOverrides={setApiRateOverrides}
            wlRateOverrides={wlRateOverrides} setWlRateOverrides={setWlRateOverrides}
          />}
        {activeTab === "scenarios"   && <ScenarioComparison
            countries={countries} availability={availability}
            priceDefaults={priceDefaults} gmDefaults={gmDefaults}
            priceOverrides={priceOverrides} gmOverrides={gmOverrides}
            apiAttachRates={apiAttachRates} wlConversionRates={wlConversionRates}
            paxDivisor={paxDivisor}
            apiRateOverrides={apiRateOverrides} wlRateOverrides={wlRateOverrides}
          />}
      </main>
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(<App />);
  </script>
</body>
</html>
